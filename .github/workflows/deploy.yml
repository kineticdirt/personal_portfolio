# .github/workflows/deploy.yml

name: Build and Deploy GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Website From Resume
        # This command runs your build.js script, which creates the 'public' directory
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # --- FIX: CHANGE THE UPLOAD PATH ---
      # This tells the action to upload the contents of the 'public'
      # directory, which is where your built website is.
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public' # <-- This path must match your build script's output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4